# @package _global_.data
task: memorization

# Data generation parameters
n_samples_train: 5000
n_samples_eval: 500
seed_train: 42
seed_eval: 99

# Task parameters
n_pairs: 100        # size of the shared (A, B) relation pool
min_T: 2            # min number of relations per sample (>=2: T-1 context + 1 query)
max_T: 10           # max number of relations per sample (must be <= n_pairs)
pool_seed: 0        # shared between train and eval → train/eval see the same pool

# Tokenization
max_length: 64
data_dir: data_files/memorization

# DataLoader
train_files:
  - ${data.data_dir}/train.pt
eval_files:
  - ${data.data_dir}/eval.pt
num_workers: 4
